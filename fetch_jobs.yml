"on":
  schedule:
    - cron: '0 22 * * *'   # nightly at 22:00 UTC (all sources)
  workflow_dispatch:         # manual trigger during the day

name: Fetch Jobs (Comeet + Greenhouse)

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: Fetch all jobs
        run: python fetch_jobs.py

      - name: Commit CSVs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add *_jobs_*.csv history.csv
          git diff --staged --quiet || git commit -m "chore: jobs update $(date -u +%Y-%m-%d)"
          git push
