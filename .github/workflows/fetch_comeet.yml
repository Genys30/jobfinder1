name: Fetch Comeet Jobs

"on":
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = midnight Israel time (IDT, UTC+2)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions tab

jobs:
  fetch-comeet:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # Needed to commit the CSV back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Comeet jobs
        run: python fetch_comeet.py

      - name: Commit CSV to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comeet_jobs_*.csv
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: Comeet jobs $(date -u +%Y-%m-%d)"
          git push
